services:
  - type: web
    name: daily-leetcode-solutions
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_PROVIDER
        value: firebase
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_BASE64
        sync: false
